<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Plus Jakarta Sans - distinctive geometric sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI Workspace - AI-native creator workspace with knowledge base and multi-agent orchestration."
    />
    <title>AI Workspace</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <!-- Apple Touch Icon (fallback for iOS) -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <!-- PWA Mobile Meta Tags (removed deprecated apple-mobile-web-app-capable for iOS 12+) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI Workspace" />
    <!-- COOP/COEP headers for SharedArrayBuffer and OPFS VFS support -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <!-- COOP/COEP Diagnostic Tool - dev only -->
    <script type="module">
      if (import.meta.env.DEV) {
        window.addEventListener('load', () => {
          // Expose diagnostic function globally
          window.diagnoseCoopCoep = () => {
            fetch('/diagnose-coop-coep.js')
              .then(r => r.text())
              .then(code => eval(code))
              .catch(() => console.error('Failed to load diagnostic tool'))
          }
          console.log('Run diagnoseCoopCoep() in console to check COOP/COEP status')
        })
      }
    </script>
    <!-- React Grab - dev only -->
    <script type="module">
      if (import.meta.env.DEV) {
        import('react-grab');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load WASM module loader before the app -->
    <script src="/wasm-loader.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
