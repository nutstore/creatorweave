<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browser-based File System Analyzer - Analyze local folders with WebAssembly"
    />
    <title>Browser FS Analyzer</title>
    <!-- COOP/COEP headers for SharedArrayBuffer and OPFS VFS support -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    <!-- COOP/COEP Diagnostic Tool - 仅开发环境加载 -->
    <script type="module">
      if (import.meta.env.DEV) {
        window.addEventListener('load', () => {
          // Expose diagnostic function globally
          window.diagnoseCoopCoep = () => {
            fetch('/diagnose-coop-coep.js')
              .then(r => r.text())
              .then(code => eval(code))
              .catch(() => console.error('Failed to load diagnostic tool'))
          }
          console.log('💡 Run diagnoseCoopCoep() in console to check COOP/COEP status')
        })
      }
    </script>
    <!-- React Grab - 仅开发环境加载 -->
    <script type="module">
      if (import.meta.env.DEV) {
        import('react-grab');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Load WASM module loader before the app -->
    <script src="/wasm-loader.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
