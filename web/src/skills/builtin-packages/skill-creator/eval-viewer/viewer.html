<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Skill Eval Review</title>
<style>
  :root { --green: #788c5d; --red: #c44; --blue: #6a9bcc; --bg: #faf9f5; --card: #fff; --border: #e8e6dc; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: var(--bg); color: #141413; }
  h1 { margin-bottom: 8px; }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-size: 14px; font-weight: 600; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #141413; border-bottom-color: #141413; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Outputs tab */
  .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .nav-bar button { padding: 6px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); cursor: pointer; }
  .nav-bar button:hover { background: #f0f0f0; }
  .nav-bar span { font-weight: 600; }
  .prompt-box { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .prompt-box strong { display: block; margin-bottom: 4px; color: #888; font-size: 12px; text-transform: uppercase; }
  .outputs { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .output-file { margin-bottom: 8px; }
  .output-file .filename { font-weight: 600; font-size: 13px; color: #555; margin-bottom: 4px; }
  .output-file pre { background: #f5f5f0; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
  .output-file img { max-width: 100%; border-radius: 4px; }
  .grading { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
  .grading-header { font-weight: 600; margin-bottom: 8px; }
  .expectation { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; font-size: 14px; }
  .expectation .icon { font-size: 16px; flex-shrink: 0; }
  .expectation .evidence { font-size: 12px; color: #888; margin-top: 2px; }
  .feedback-box { margin-bottom: 12px; }
  .feedback-box label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
  .feedback-box textarea { width: 100%; min-height: 80px; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: inherit; font-size: 14px; resize: vertical; }
  .previous-feedback { background: #f5f5f0; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
  .previous-outputs { margin-bottom: 12px; }
  .previous-outputs summary { font-weight: 600; cursor: pointer; color: var(--blue); margin-bottom: 4px; }
  .btn-submit { padding: 10px 24px; background: #141413; color: #faf9f5; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-submit:hover { background: #333; }

  /* Benchmark tab */
  .benchmark-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
  .benchmark-table th, .benchmark-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .benchmark-table th { background: #141413; color: #faf9f5; font-weight: 600; }
  .positive { color: var(--green); } .negative { color: var(--red); }
</style>
</head>
<body>
<h1 id="title">Skill Eval Review</h1>
<div class="tabs">
  <button class="tab active" data-tab="outputs">Outputs</button>
  <button class="tab" data-tab="benchmark">Benchmark</button>
</div>
<div id="outputs-tab" class="tab-content active"></div>
<div id="benchmark-tab" class="tab-content"></div>

<script>
/*__EMBEDDED_DATA__*/

// Tab switching
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
  });
});

// Title
document.getElementById('title').textContent = EMBEDDED_DATA.skill_name + ' — Eval Review';

// --- Outputs Tab ---
const runs = EMBEDDED_DATA.runs || [];
let currentIdx = 0;

function renderRun(idx) {
  const run = runs[idx];
  const container = document.getElementById('outputs-tab');

  let html = `<div class="nav-bar">
    <button onclick="nav(-1)" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
    <span>${idx + 1} / ${runs.length}</span>
    <button onclick="nav(1)" ${idx === runs.length - 1 ? 'disabled' : ''}>Next →</button>
  </div>`;

  // Prompt
  html += `<div class="prompt-box"><strong>Prompt</strong><div>${escHtml(run.prompt)}</div></div>`;

  // Previous outputs (iteration 2+)
  const prevOutputs = EMBEDDED_DATA.previous_outputs[run.id];
  if (prevOutputs && prevOutputs.length) {
    html += `<div class="previous-outputs"><details><summary>Previous iteration outputs</summary>`;
    prevOutputs.forEach(o => { html += renderOutput(o); });
    html += `</details></div>`;
  }

  // Outputs
  html += `<div class="outputs"><strong>Output Files</strong>`;
  if (run.outputs && run.outputs.length) {
    run.outputs.forEach(o => { html += renderOutput(o); });
  } else {
    html += `<p style="color:#888">No output files</p>`;
  }
  html += `</div>`;

  // Grading
  if (run.grading) {
    html += `<div class="grading"><div class="grading-header">Formal Grades (${run.grading.summary.passed}/${run.grading.summary.total} passed)</div>`;
    (run.grading.expectations || []).forEach(e => {
      const cls = e.passed ? 'positive' : 'negative';
      const icon = e.passed ? '✓' : '✗';
      html += `<div class="expectation"><span class="icon ${cls}">${icon}</span><div>${escHtml(e.text)}${e.evidence ? `<div class="evidence">${escHtml(e.evidence)}</div>` : ''}</div></div>`;
    });
    html += `</div>`;
  }

  // Previous feedback
  const prevFb = EMBEDDED_DATA.previous_feedback[run.id];
  if (prevFb) {
    html += `<div class="previous-feedback"><strong>Previous feedback:</strong> ${escHtml(prevFb)}</div>`;
  }

  // Feedback textarea
  html += `<div class="feedback-box"><label>Feedback</label><textarea id="fb-${idx}" data-run-id="${run.id}" placeholder="Leave feedback...">${(run._feedback || '')}</textarea></div>`;

  container.innerHTML = html;
}

function renderOutput(o) {
  if (o.type === 'text') {
    return `<div class="output-file"><div class="filename">${escHtml(o.name)}</div><pre>${escHtml(o.content)}</pre></div>`;
  } else if (o.type === 'image') {
    return `<div class="output-file"><div class="filename">${escHtml(o.name)}</div><img src="${o.data_uri}" alt="${escHtml(o.name)}"></div>`;
  } else if (o.type === 'pdf') {
    return `<div class="output-file"><div class="filename">📄 ${escHtml(o.name)}</div><iframe src="${o.data_uri}" width="100%" height="400px"></iframe></div>`;
  } else {
    return `<div class="output-file"><div class="filename">📎 ${escHtml(o.name)} (${o.type})</div></div>`;
  }
}

function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function nav(delta) {
  // Save current feedback
  const ta = document.getElementById('fb-' + currentIdx);
  if (ta) runs[currentIdx]._feedback = ta.value;
  currentIdx += delta;
  renderRun(currentIdx);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' && currentIdx > 0) nav(-1);
  if (e.key === 'ArrowRight' && currentIdx < runs.length - 1) nav(1);
});

// --- Benchmark Tab ---
function renderBenchmark() {
  const container = document.getElementById('benchmark-tab');
  const bm = EMBEDDED_DATA.benchmark;
  if (!bm) { container.innerHTML = '<p>No benchmark data</p>'; return; }

  let html = '<h3>Summary</h3>';
  const summary = bm.run_summary || {};
  const configs = Object.keys(summary).filter(k => k !== 'delta');
  const delta = summary.delta || {};

  html += '<table class="benchmark-table"><tr><th>Metric</th>';
  configs.forEach(c => { html += `<th>${c.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</th>`; });
  html += '<th>Delta</th></tr>';

  ['pass_rate', 'time_seconds', 'tokens'].forEach(metric => {
    html += `<tr><td>${metric.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</td>`;
    configs.forEach(c => {
      const s = summary[c] && summary[c][metric];
      if (s) html += `<td>${(s.mean * 100).toFixed(0)}% ± ${(s.stddev * 100).toFixed(0)}%</td>`;
      else html += '<td>—</td>';
    });
    html += `<td>${delta[metric] || '—'}</td></tr>`;
  });
  html += '</table>';

  if (bm.notes && bm.notes.length) {
    html += '<h3 style="margin-top:16px">Notes</h3><ul>';
    bm.notes.forEach(n => { html += `<li>${escHtml(n)}</li>`; });
    html += '</ul>';
  }

  container.innerHTML = html;
}

// Init
if (runs.length) renderRun(0);
renderBenchmark();
</script>
</body>
</html>
