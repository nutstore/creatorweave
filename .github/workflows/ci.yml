name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rustfmt
        run: cd wasm && cargo fmt --all -- --check

      - name: Run Clippy
        run: cd wasm && cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cd wasm && cargo test

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Enforce import path convention
        run: |
          if git grep -nE "@(ui|i18n|encryption|conversation)(/|['\"])" -- '**/*.ts' '**/*.tsx' '**/*.js' '**/*.jsx' '**/*.mjs' '**/*.cjs'; then
            echo "Short aliases (@ui/@i18n/@encryption/@conversation) are forbidden. Use @creatorweave/*."
            exit 1
          fi

      - name: Run TypeScript type check
        run: |
          cd web
          npm run typecheck

      - name: Run ESLint
        run: |
          cd web
          npm run lint

      - name: Run frontend tests
        run: |
          cd web
          npm test -- --run

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [rust, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Build WASM module
        run: |
          cd wasm
          wasm-pack build --target web --out-dir ../web/public/wasm crates/wasm-bindings

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web/dist/
