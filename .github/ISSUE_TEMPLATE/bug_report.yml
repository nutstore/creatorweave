name: Bug report
description: Report a reproducible problem in CreatorWeave
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve CreatorWeave. Please include enough detail for maintainers to reproduce the issue without access to private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Briefly describe the problem.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser/app version, Node/pnpm version if relevant, and any package/runtime versions involved.
      placeholder: |
        - OS:
        - Browser/app:
        - Node:
        - pnpm:
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots or logs
      description: Attach screenshots, console output, or logs if useful. Remove secrets, tokens, and private data before posting.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets, credentials, and private data from screenshots/logs.
          required: true
